<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1A1612"/>

  <!-- Calculator body -->
  <rect x="120" y="80" width="272" height="352" rx="28" fill="#C8402A"/>

  <!-- Calculator screen -->
  <rect x="148" y="108" width="216" height="90" rx="12" fill="#1A1612"/>

  <!-- Screen text: FHC -->
  <text x="256" y="172" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#FFFDF8" text-anchor="middle">FHC</text>

  <!-- Button grid -->
  <!-- Row 1 -->
  <rect x="148" y="222" width="56" height="44" rx="8" fill="#FFFDF8" opacity="0.15"/>
  <rect x="220" y="222" width="56" height="44" rx="8" fill="#FFFDF8" opacity="0.15"/>
  <rect x="292" y="222" width="72" height="44" rx="8" fill="#FFFDF8" opacity="0.25"/>

  <!-- Row 2 -->
  <rect x="148" y="280" width="56" height="44" rx="8" fill="#FFFDF8" opacity="0.15"/>
  <rect x="220" y="280" width="56" height="44" rx="8" fill="#FFFDF8" opacity="0.15"/>
  <rect x="292" y="280" width="72" height="44" rx="8" fill="#FFFDF8" opacity="0.15"/>

  <!-- Row 3 -->
  <rect x="148" y="338" width="56" height="44" rx="8" fill="#FFFDF8" opacity="0.15"/>
  <rect x="220" y="338" width="56" height="44" rx="8" fill="#FFFDF8" opacity="0.15"/>
  <rect x="292" y="338" width="72" height="44" rx="8" fill="#C8402A" opacity="0.9"/>

  <!-- Heart on bottom right button -->
  <text x="328" y="368" font-size="26" text-anchor="middle" fill="#fff">+</text>

  <!-- Button symbols -->
  <text x="176" y="252" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">7</text>
  <text x="248" y="252" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">8</text>
  <text x="328" y="252" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">÷</text>

  <text x="176" y="310" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">4</text>
  <text x="248" y="310" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">5</text>
  <text x="328" y="310" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">×</text>

  <text x="176" y="368" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">1</text>
  <text x="248" y="368" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">2</text>

  <!-- Small health cross on top right corner of calculator -->
  <rect x="340" y="88" width="36" height="10" rx="3" fill="#FFFDF8" opacity="0.3"/>
  <rect x="350" y="78" width="10" height="30" rx="3" fill="#FFFDF8" opacity="0.3"/>
</svg>
