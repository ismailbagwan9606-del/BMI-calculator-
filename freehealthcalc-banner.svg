<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="#1A1612"/>

  <!-- Icon box -->
  <rect x="20" y="20" width="160" height="160" rx="24" fill="#C8402A"/>

  <!-- Mini calculator on icon -->
  <rect x="45" y="40" width="110" height="140" rx="12" fill="#1A1612" opacity="0.6"/>
  <rect x="55" y="50" width="90" height="38" rx="6" fill="#FFFDF8" opacity="0.15"/>
  <text x="100" y="77" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#FFFDF8" text-anchor="middle">FHC</text>

  <!-- Mini buttons -->
  <rect x="55" y="98" width="22" height="16" rx="3" fill="#FFFDF8" opacity="0.2"/>
  <rect x="83" y="98" width="22" height="16" rx="3" fill="#FFFDF8" opacity="0.2"/>
  <rect x="111" y="98" width="24" height="16" rx="3" fill="#C8402A" opacity="0.8"/>

  <rect x="55" y="120" width="22" height="16" rx="3" fill="#FFFDF8" opacity="0.2"/>
  <rect x="83" y="120" width="22" height="16" rx="3" fill="#FFFDF8" opacity="0.2"/>
  <rect x="111" y="120" width="24" height="16" rx="3" fill="#FFFDF8" opacity="0.2"/>

  <rect x="55" y="142" width="78" height="16" rx="3" fill="#C8402A" opacity="0.9"/>
  <rect x="139" y="142" width="24" height="16" rx="3" fill="#FFFDF8" opacity="0.2"/>

  <!-- Heart symbol -->
  <text x="123" y="107" font-size="10" text-anchor="middle" fill="#fff">+</text>

  <!-- Brand name -->
  <text x="210" y="95" font-family="Georgia,serif" font-size="58" font-weight="bold" fill="#FFFDF8" dominant-baseline="middle">free</text>
  <text x="370" y="95" font-family="Georgia,serif" font-size="58" font-weight="bold" fill="#C8402A" dominant-baseline="middle">health</text>
  <text x="620" y="95" font-family="Georgia,serif" font-size="58" font-weight="bold" fill="#FFFDF8" dominant-baseline="middle">calc</text>

  <!-- Tagline -->
  <text x="210" y="148" font-family="Arial,sans-serif" font-size="20" fill="#FFFDF8" opacity="0.5" letter-spacing="3">FREE HEALTH CALCULATORS · TRUSTED RESULTS</text>

  <!-- Decorative line -->
  <rect x="210" y="118" width="560" height="2" rx="1" fill="#C8402A" opacity="0.4"/>
